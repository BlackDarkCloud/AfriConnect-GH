<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AfriConnect GH | Gallery</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body data-page="gallery">
    <header class="site-header"></header>
    <main>
      <section class="page-title reveal">
        <p class="section-kicker" data-i18n="gallery.kicker">Customer moments</p>
        <h1 data-i18n="gallery.title">Our clients, trips and Ghana experiences.</h1>
        <p data-i18n="gallery.copy">This gallery is for AfriConnect GH customer images, guided visits, airport support moments, tours and real service memories.</p>
      </section>
      <section class="section gallery-section reveal">
        <div id="galleryGrid" class="gallery-grid"></div>
      </section>
    </main>
    <footer class="site-footer"></footer>
    <div id="languageModal" class="language-modal" aria-modal="true" role="dialog"></div>
    <div class="floating-actions"></div>
    <script src="/app.js" type="module"></script>
  </body>
</html>
