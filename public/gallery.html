<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AfriConnect GH | Gallery</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body data-page="gallery">
    <header class="site-header"></header>
    <main>
      <div class="page-header reveal">
        <div class="page-header-inner">
          <p class="t-eyebrow" data-i18n="gallery.kicker">Visual stories</p>
          <h1 class="t-h1" data-i18n="gallery.title">Client moments &amp; Ghana experiences</h1>
          <p data-i18n="gallery.copy">Real moments from our clients' journeys across Ghana. Add your own photos via the admin panel.</p>
        </div>
      </div>
      <section class="section reveal">
        <div class="gallery-maso" id="galleryGrid"></div>
      </section>
    </main>
    <footer class="site-footer"></footer>
    <div id="languageModal" class="language-modal" aria-modal="true" role="dialog"></div>
    <div class="floating-actions"></div>
    <script src="/app.js" type="module"></script>
  </body>
</html>
