<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AfriConnect GH | Contact</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body data-page="contact">
    <header class="site-header"></header>
    <main>
      <section class="contact contact-page reveal">
        <div>
          <p class="section-kicker" data-i18n="contact.kicker">Start your trip with confidence</p>
          <h1 data-i18n="contact.title">Talk to AfriConnect GH today</h1>
          <p data-i18n="contact.copy">Send us your arrival date, language, destination, budget and the type of help you need. We will guide you before and during your stay.</p>
        </div>
        <div class="contact-panel">
          <a href="tel:+233597154822">+233 597 154 822</a>
          <a href="mailto:africonnectgh@gmail.com">africonnectgh@gmail.com</a>
          <a href="https://wa.me/233597154822">WhatsApp</a>
          <span>Accra, Ghana</span>
        </div>
      </section>

      <section class="section reveal">
        <div class="section-head">
          <p class="section-kicker">Request</p>
          <h2>Send your trip details</h2>
        </div>
        <form id="quoteForm" class="quote-form">
          <label><span data-i18n="form.name">Full name</span><input name="name" required></label>
          <label><span data-i18n="form.service">Service needed</span><input name="service" placeholder="Airport pickup, tour, translation..." required></label>
          <label><span data-i18n="form.date">Travel date</span><input name="date" type="date"></label>
          <label class="full"><span data-i18n="form.message">What do you need help with?</span><textarea name="message" required></textarea></label>
          <button class="btn primary whatsapp-btn" type="submit" data-i18n="form.send">Send request on WhatsApp</button>
        </form>
      </section>
    </main>
    <footer class="site-footer"></footer>
    <div id="languageModal" class="language-modal" aria-modal="true" role="dialog"></div>
    <div class="floating-actions"></div>
    <script src="/app.js" type="module"></script>
  </body>
</html>
