<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="description" content="AfriConnect GH — Your trusted bilingual travel, tour, settlement and money transfer partner in Ghana and West Africa.">
  <title>AfriConnect GH | Travel · Invest · Succeed</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="/styles.css">
</head>
<body data-page="home">
  <div class="flag-stripe"><b></b><b></b><b></b></div>
  <header class="site-header" id="siteHeader"></header>
  <main>
    <!-- HERO -->
    <section class="hero" id="hero">
      <div class="hero-flag-bg"><b></b><b></b><b></b></div>
      <div class="hero-slides" id="heroSlides"></div>
      <div class="hero-content">
        <div class="hero-left reveal">
          <div class="hero-eyebrow">
            <p class="eyebrow" data-i18n="hero.kicker"></p>
          </div>
          <h1 class="t-hero" id="heroHead"></h1>
          <p class="hero-sub" data-i18n="hero.sub"></p>
          <div class="hero-btns">
            <a class="btn gold lg wa-btn" href="https://wa.me/233591754822"><span data-i18n="hero.cta1"></span></a>
            <a class="btn outline-w lg" href="/services.html" data-i18n="hero.cta2"></a>
          </div>
          <div class="hero-countries" id="heroCountries"></div>
        </div>
        <div class="hero-right" id="heroRight"></div>
      </div>
      <div class="hero-dots" id="heroDots"></div>
    </section>

    <!-- KENTE + MARQUEE -->
    <div class="kente"></div>
    <div class="marquee-strip"><div class="marquee-inner" id="marquee"></div></div>
    <div class="kente"></div>

    <!-- SERVICES -->
    <div class="services-bg">
      <section class="section reveal">
        <div class="shead">
          <p class="eyebrow" data-i18n="sv.kicker"></p>
          <h2 class="t-h2" data-i18n="sv.title"></h2>
          <p data-i18n="sv.sub"></p>
        </div>
        <div class="sv-grid" id="svGrid"></div>
      </section>
    </div>

    <!-- WHY US -->
    <div class="why-band reveal">
      <div class="why-inner" id="whyGrid"></div>
    </div>

    <!-- DESTINATIONS -->
    <section class="section reveal">
      <div class="shead">
        <p class="eyebrow" data-i18n="dest.kicker"></p>
        <h2 class="t-h2" data-i18n="dest.title"></h2>
        <p data-i18n="dest.sub"></p>
      </div>
      <div class="dest-grid" id="destGrid"></div>
    </section>

    <!-- INFO BAND -->
    <div class="info-band reveal">
      <div class="info-inner">
        <div>
          <strong data-i18n="info.title"></strong>
          <p data-i18n="info.sub"></p>
        </div>
        <a class="btn outline-g" href="https://wa.me/233591754822" data-i18n="info.cta"></a>
      </div>
    </div>

    <!-- HOW IT WORKS -->
    <div class="how-bg">
      <div class="section-full reveal" style="max-width:1380px;margin:0 auto">
        <div class="shead white">
          <p class="eyebrow" data-i18n="how.kicker"></p>
          <h2 class="t-h2" data-i18n="how.title"></h2>
          <p data-i18n="how.sub"></p>
        </div>
        <div class="how-grid" id="howGrid"></div>
      </div>
    </div>

    <!-- METRICS -->
    <div class="metrics-bg reveal">
      <div class="metrics-inner" id="metricsGrid"></div>
    </div>

    <!-- TESTIMONIALS -->
    <div class="reviews-bg">
      <section class="section reveal">
        <div class="shead center">
          <p class="eyebrow" data-i18n="rev.kicker"></p>
          <h2 class="t-h2" data-i18n="rev.title"></h2>
        </div>
        <div class="test-grid" id="testGrid"></div>
      </section>
    </div>

    <!-- FAQ -->
    <section class="section reveal">
      <div class="faq-cols">
        <div class="faq-l">
          <p class="eyebrow">FAQ</p>
          <h2 class="t-h2" data-i18n="faq.title"></h2>
          <p data-i18n="faq.sub"></p>
          <a class="btn outline-g" href="/contact.html" data-i18n="faq.cta"></a>
        </div>
        <div class="faq-list" id="faqList"></div>
      </div>
    </section>

    <!-- CTA -->
    <div class="cta-band reveal">
      <div class="cta-inner">
        <p class="eyebrow" data-i18n="cta.kicker"></p>
        <h2 class="t-h2" data-i18n="cta.title"></h2>
        <p data-i18n="cta.sub"></p>
        <div class="cta-btns">
          <a class="btn gold lg wa-btn" href="https://wa.me/233591754822"><span data-i18n="cta.btn1"></span></a>
          <a class="btn outline-w lg" href="/services.html" data-i18n="cta.btn2"></a>
        </div>
      </div>
    </div>
  </main>
  <div class="kente"></div>
  <footer class="site-footer" id="siteFooter"></footer>
  <div class="lang-modal" id="langModal"></div>
  <div class="floating" id="floating"></div>
  <script src="/app.js" type="module"></script>
</body>
</html>
