<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>AfriConnect GH | Contact</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link rel="stylesheet" href="/styles.css"></head>
<body data-page="contact">
<div class="flag-stripe"><b></b><b></b><b></b></div>
<header class="site-header" id="siteHeader"></header>
<main>
  <div class="page-hd reveal"><div class="page-hd-in"><p class="eyebrow" data-i18n="cnt.kicker"></p><h1 class="t-h1" data-i18n="cnt.title"></h1><p data-i18n="cnt.sub"></p></div></div>
  <div class="kente"></div>
  <div style="background:var(--cream)">
    <section class="section reveal">
      <div class="cnt-grid">
        <div class="cnt-l"><p class="eyebrow" data-i18n="cnt.reach"></p><h2 class="t-h2" data-i18n="cnt.avail"></h2><p data-i18n="cnt.avail.sub"></p><div class="ch-list" id="chList"></div></div>
        <div class="form-card">
          <h3 class="t-h3" style="color:var(--green);margin-bottom:22px" data-i18n="cnt.form.title"></h3>
          <form id="quoteForm" class="fg">
            <label class="fl"><span data-i18n="form.name"></span><input class="fi2" name="name" required placeholder="Your full name"></label>
            <div class="fr">
              <label class="fl"><span data-i18n="form.service"></span><input class="fi2" name="service" placeholder="e.g. Airport pickup, Tour"></label>
              <label class="fl"><span data-i18n="form.date"></span><input class="fi2" name="date" type="date"></label>
            </div>
            <label class="fl"><span data-i18n="form.lang"></span>
              <select class="fi2" name="lang">
                <option value="English">English</option>
                <option value="French">Français</option>
                <option value="Both">Both / Les deux</option>
              </select>
            </label>
            <label class="fl"><span data-i18n="form.msg"></span><textarea class="fi2" name="message" required placeholder="Destination, group size, budget range, any special requirements…"></textarea></label>
            <button class="btn gold lg wa-btn" type="submit"><span data-i18n="form.send"></span></button>
          </form>
        </div>
      </div>
    </section>
  </div>
</main>
<div class="kente"></div>
<footer class="site-footer" id="siteFooter"></footer>
<div class="lang-modal" id="langModal"></div>
<div class="floating" id="floating"></div>
<script src="/app.js" type="module"></script>
</body></html>
