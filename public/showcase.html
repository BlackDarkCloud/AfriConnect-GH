<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AfriConnect GH | Showcase</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body data-page="showcase">
    <header class="site-header"></header>
    <main>
      <section class="page-title reveal">
        <p class="section-kicker" data-i18n="destinations.kicker">Tour Ghana with local guidance</p>
        <h1 data-i18n="destinations.title">Premium Ghana destinations to explore</h1>
        <p data-i18n="destinations.copy">From heritage castles and canopy walks to waterfalls, beaches, city landmarks and national parks, we help you plan routes that fit your time, budget and language needs.</p>
      </section>
      <section class="section reveal">
        <div id="destinationFilters" class="filter-bar"></div>
        <div id="destinationGrid" class="destination-grid"></div>
      </section>
      <section class="section reveal">
        <div class="section-head">
          <p class="section-kicker" data-i18n="offers.kicker">Current packages</p>
          <h2 data-i18n="offers.title">Offers and travel packages</h2>
        </div>
        <div id="offerGrid" class="offer-grid"></div>
      </section>
    </main>
    <footer class="site-footer"></footer>
    <div id="languageModal" class="language-modal" aria-modal="true" role="dialog"></div>
    <div class="floating-actions"></div>
    <script src="/app.js" type="module"></script>
  </body>
</html>
